name: "Template Cleanup"
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # Required for git push

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: github.repository != 'noeScalerandi/sdd-orchestrator'
    steps:
      - uses: actions/checkout@v4

      - name: Remove template-only workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove the injector (only needed in orchestrator)
          git rm -f .github/workflows/injector.yml || true

          # Remove this cleanup workflow (one-time use)
          git rm -f .github/workflows/template-cleanup.yml

          git commit -m "chore: remove template-only workflows"
          git push
