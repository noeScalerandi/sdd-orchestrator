# ============================================================================
# DEPENDENCY REVIEW
# ============================================================================
# This workflow analyzes new or updated dependencies in each PR to detect
# known security vulnerabilities.
#
# Behavior:
#   - Fails the check if HIGH or CRITICAL severity vulnerabilities are detected
#   - Emits a warning (without failing) for LOW and MEDIUM severities
#   - Compatible with multiple ecosystems: npm, pip, Maven, Go, Cargo, etc.
#
# Requires Dependency Graph to be enabled in the repository:
#   Settings → Security → Dependency graph
# ============================================================================

name: "Dependency Review"

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: "Review dependency vulnerabilities"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Analyze dependencies"
        uses: actions/dependency-review-action@v4
        with:
          # Fail only on high or critical vulnerabilities
          fail-on-severity: high
          # Post a summary comment on the PR
          comment-summary-in-pr: always
